name: PlayerVaultPlus
version: 1.1.0
main: com.playervaultplus.PlayerVaultPlus
description: Personal vault storage plugin with MySQL + Auto-Sort + Item Editor
authors: [YourName]
apiVersion: "1.21"
load: POSTWORLD

commands:
  pv:
    description: Open your personal vault
    usage: /pv
    aliases: [pvault, vault]
  pvadmin:
    description: Admin vault commands
    usage: /pvadmin <reload|migrate|info>
    permission: playervaultplus.admin